<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Asset Monitoring Agent</title>

  <link href="https://fonts.googleapis.com/css2?family=Plus+Jakarta+Sans:wght@400;500;600;700&family=DM+Mono:wght@400;500&display=swap" rel="stylesheet">
  <link rel="stylesheet" href="https://unpkg.com/leaflet@1.9.4/dist/leaflet.css"/>
  <script src="https://unpkg.com/leaflet@1.9.4/dist/leaflet.js"></script>
  <script src="https://cdn.jsdelivr.net/npm/chart.js@4.4.0/dist/chart.umd.min.js"></script>
  <script src="https://cdn.jsdelivr.net/npm/marked@9.1.6/marked.min.js"></script>

  <style>
    /* ===== DESIGN TOKENS ===== */
    :root {
      --bg:              #f8f9fa;
      --surface:         rgba(0,0,0,0.03);
      --surface-hover:   rgba(0,0,0,0.06);
      --glass:           #ffffff;
      --border:          rgba(0,0,0,0.1);
      --border-strong:   rgba(0,0,0,0.18);
      --accent:          #2563eb;
      --accent-hover:    #1d4ed8;
      --accent-dim:      rgba(37,99,235,0.08);
      --accent-glow:     rgba(37,99,235,0.2);
      --text-primary:    #1a1a1a;
      --text-secondary:  #6b7280;
      --text-muted:      #9ca3af;
      --warning:         #f59e0b;
      --warning-dim:     rgba(245,158,11,0.1);
      --blue:            #0ea5e9;
      --blue-dim:        rgba(14,165,233,0.1);
      --r-sm:  6px;
      --r-md:  10px;
      --r-lg:  14px;
      --r-xl:  20px;
      --topnav-h: 52px;
    }

    *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }
    html, body { height: 100%; overflow: hidden; }

    body {
      background: var(--bg);
      color: var(--text-primary);
      font-family: 'Plus Jakarta Sans', -apple-system, sans-serif;
      font-size: 14px;
      line-height: 1.5;
    }

    /* ===== TOPNAV ===== */
    .topnav {
      position: fixed;
      top: 0; left: 0; right: 0;
      height: var(--topnav-h);
      background: rgba(255,255,255,0.92);
      backdrop-filter: blur(16px);
      border-bottom: 1px solid var(--border);
      display: flex;
      align-items: center;
      justify-content: space-between;
      padding: 0 20px;
      z-index: 1000;
    }
    .topnav-brand {
      display: flex;
      align-items: center;
      gap: 10px;
      font-weight: 600;
      font-size: 15px;
      letter-spacing: -0.01em;
    }
    .live-dot {
      width: 8px; height: 8px;
      border-radius: 50%;
      background: var(--accent);
      box-shadow: 0 0 8px var(--accent-glow);
      animation: pulse-dot 2.2s ease-in-out infinite;
    }
    @keyframes pulse-dot {
      0%, 100% { opacity: 1; transform: scale(1); box-shadow: 0 0 8px var(--accent-glow); }
      50%       { opacity: 0.55; transform: scale(0.8); box-shadow: 0 0 4px var(--accent-glow); }
    }
    .topnav-right {
      display: flex;
      align-items: center;
      gap: 8px;
    }
    .pill {
      padding: 3px 10px;
      border-radius: 100px;
      font-size: 11px;
      font-weight: 500;
      letter-spacing: 0.02em;
    }
    .pill-live {
      background: var(--accent-dim);
      color: var(--accent);
      border: 1px solid rgba(37,99,235,0.2);
    }
    .pill-meta {
      color: var(--text-muted);
      font-family: 'DM Mono', monospace;
      font-size: 11px;
    }

    /* ===== LAYOUT ===== */
    .main {
      display: flex;
      height: 100vh;
      padding-top: var(--topnav-h);
    }

    /* ===== MAP PANEL ===== */
    .map-panel {
      flex: 0 0 62%;
      position: relative;
      border-right: 1px solid var(--border);
    }
    #map { width: 100%; height: 100%; }

    .leaflet-tile-pane         { filter: none; }
    .leaflet-control-attribution { display: none; }
    .leaflet-control-zoom a {
      background: rgba(255,255,255,0.9) !important;
      color: var(--text-primary) !important;
      border-color: var(--border) !important;
      backdrop-filter: blur(8px);
    }
    .leaflet-control-zoom a:hover { background: var(--surface-hover) !important; }

    /* Custom pin */
    .asset-pin {
      width: 38px; height: 38px;
      border-radius: 50% 50% 50% 0;
      transform: rotate(-45deg);
      background: var(--accent);
      border: 2.5px solid rgba(255,255,255,0.7);
      box-shadow: 0 2px 8px rgba(0,0,0,0.2);
      display: flex;
      align-items: center;
      justify-content: center;
      cursor: pointer;
      transition: box-shadow 0.2s;
    }
    .asset-pin.selected {
      background: #1a1a1a;
      border-color: rgba(0,0,0,0.3);
      box-shadow: 0 2px 12px rgba(0,0,0,0.3);
    }
    .asset-pin-label {
      transform: rotate(45deg);
      font-size: 11px;
      font-weight: 700;
      color: #ffffff;
      font-family: 'DM Mono', monospace;
      letter-spacing: -0.02em;
    }

    /* Leaflet popup */
    .leaflet-popup-content-wrapper {
      background: #ffffff !important;
      backdrop-filter: blur(16px);
      border: 1px solid var(--border) !important;
      border-radius: var(--r-lg) !important;
      box-shadow: 0 4px 20px rgba(0,0,0,0.12) !important;
      color: var(--text-primary) !important;
      padding: 0 !important;
    }
    .leaflet-popup-content { margin: 0 !important; }
    .leaflet-popup-tip     { background: #ffffff !important; }
    .leaflet-popup-close-button { color: var(--text-secondary) !important; top: 10px !important; right: 10px !important; }

    .popup-card { padding: 14px 16px 12px; min-width: 200px; }
    .popup-name {
      font-size: 13px;
      font-weight: 600;
      margin-bottom: 8px;
    }
    .popup-row {
      display: flex;
      align-items: center;
      justify-content: space-between;
      font-size: 12px;
      color: var(--text-secondary);
      margin-bottom: 4px;
    }
    .popup-status {
      display: inline-flex;
      align-items: center;
      gap: 4px;
      font-size: 11px;
      font-weight: 500;
      padding: 2px 8px;
      border-radius: 100px;
    }
    .popup-status.busy { background: #dcfce7; color: #16a34a; }
    .popup-status.idle { background: var(--warning-dim); color: #b45309; }
    .popup-actions {
      margin-top: 10px;
      display: flex;
      gap: 6px;
    }
    .popup-btn {
      flex: 1;
      padding: 7px 0;
      border-radius: var(--r-md);
      font-size: 12px;
      font-weight: 600;
      cursor: pointer;
      border: none;
      font-family: 'Plus Jakarta Sans', sans-serif;
      transition: opacity 0.15s;
    }
    .popup-btn:hover { opacity: 0.85; }
    .popup-btn-primary { background: var(--accent); color: #ffffff; }
    .popup-btn-ghost   {
      background: var(--surface);
      color: var(--text-secondary);
      border: 1px solid var(--border);
    }

    /* ===== CHAT PANEL ===== */
    .chat-panel {
      flex: 0 0 38%;
      display: flex;
      flex-direction: column;
      background: var(--bg);
    }
    .chat-header {
      display: flex;
      align-items: center;
      justify-content: space-between;
      padding: 13px 16px 11px;
      border-bottom: 1px solid var(--border);
      flex-shrink: 0;
    }
    .chat-header-title {
      font-size: 13px;
      font-weight: 600;
    }
    .context-badge {
      padding: 3px 10px;
      border-radius: 100px;
      font-size: 11px;
      font-weight: 500;
      font-family: 'DM Mono', monospace;
      opacity: 0;
      transition: opacity 0.2s;
      background: var(--accent-dim);
      color: var(--accent);
      border: 1px solid rgba(37,99,235,0.15);
    }
    .context-badge.show { opacity: 1; }

    .chat-thread {
      flex: 1;
      overflow-y: auto;
      padding: 16px;
      display: flex;
      flex-direction: column;
      gap: 10px;
      scroll-behavior: smooth;
    }
    .chat-thread::-webkit-scrollbar { width: 3px; }
    .chat-thread::-webkit-scrollbar-thumb { background: var(--border-strong); border-radius: 4px; }

    /* Empty state */
    .chat-empty {
      flex: 1;
      display: flex;
      flex-direction: column;
      align-items: center;
      justify-content: center;
      gap: 8px;
      color: var(--text-muted);
      text-align: center;
      padding: 28px;
    }
    .chat-empty-glyph { font-size: 26px; opacity: 0.3; margin-bottom: 4px; }
    .chat-empty-title { font-size: 13px; font-weight: 500; color: var(--text-secondary); }
    .chat-empty-sub   { font-size: 12px; max-width: 210px; line-height: 1.55; }

    /* Prompt suggestions */
    .prompt-suggestions {
      display: flex;
      flex-wrap: wrap;
      justify-content: center;
      gap: 6px;
      margin-top: 14px;
      max-width: 340px;
    }
    .prompt-chip {
      padding: 6px 12px;
      border-radius: 100px;
      font-size: 11.5px;
      font-weight: 500;
      color: var(--text-secondary);
      background: #ffffff;
      border: 1px solid var(--border);
      cursor: pointer;
      font-family: 'Plus Jakarta Sans', sans-serif;
      transition: border-color 0.15s, color 0.15s, background 0.15s, transform 0.1s;
      line-height: 1.4;
      text-align: center;
    }
    .prompt-chip:hover {
      border-color: var(--accent);
      color: var(--accent);
      background: var(--accent-dim);
      transform: translateY(-1px);
    }
    .prompt-chip:active {
      transform: scale(0.97);
    }

    /* Messages */
    .msg { display: flex; flex-direction: column; max-width: 93%; }
    .msg.user { align-self: flex-end; align-items: flex-end; }
    .msg.ai   { align-self: flex-start; align-items: flex-start; }

    .bubble {
      padding: 9px 13px;
      font-size: 13px;
      line-height: 1.55;
    }
    .msg.user .bubble {
      background: var(--accent);
      color: #ffffff;
      font-weight: 500;
      border-radius: var(--r-lg) var(--r-lg) 4px var(--r-lg);
    }
    .msg.ai .bubble {
      background: #ffffff;
      border: 1px solid var(--border);
      color: var(--text-primary);
      border-radius: 4px var(--r-lg) var(--r-lg) var(--r-lg);
    }
    .msg.ai .bubble p  { margin: 0 0 6px; }
    .msg.ai .bubble p:last-child { margin: 0; }
    .msg.ai .bubble strong { color: var(--accent); font-weight: 600; }
    .msg.ai .bubble code {
      font-family: 'DM Mono', monospace;
      font-size: 11px;
      background: rgba(0,0,0,0.05);
      padding: 1px 5px;
      border-radius: 4px;
    }

    /* AI loading dots — from 21st.dev ai-agent-processing-states */
    @keyframes ai-dots-think {
      0%, 100% { transform: translateY(0) scale(0.85); opacity: 0.3; filter: blur(0.5px); }
      50%       { transform: translateY(-3px) scale(1.2); opacity: 1; filter: blur(0px); }
    }
    .ai-loader {
      display: inline-flex;
      align-items: center;
      gap: 4px;
      padding: 9px 14px;
      background: #ffffff;
      border: 1px solid var(--border);
      border-radius: 4px var(--r-lg) var(--r-lg) var(--r-lg);
    }
    .ai-loader-dot {
      width: 6px; height: 6px;
      border-radius: 50%;
      background: var(--accent);
    }
    .ai-loader-dot:nth-child(1) { animation: ai-dots-think 1.4s ease-in-out infinite; animation-delay:   0ms; }
    .ai-loader-dot:nth-child(2) { animation: ai-dots-think 1.4s ease-in-out infinite; animation-delay: 160ms; }
    .ai-loader-dot:nth-child(3) { animation: ai-dots-think 1.4s ease-in-out infinite; animation-delay: 320ms; }

    /* Chat input */
    .chat-input-wrap {
      padding: 10px 14px 14px;
      border-top: 1px solid var(--border);
      flex-shrink: 0;
    }
    .chat-input-row {
      display: flex;
      align-items: flex-end;
      gap: 8px;
      background: #ffffff;
      border: 1px solid var(--border);
      border-radius: var(--r-lg);
      padding: 9px 12px;
      transition: border-color 0.15s, box-shadow 0.15s;
    }
    .chat-input-row:focus-within {
      border-color: rgba(37,99,235,0.4);
      box-shadow: 0 0 0 2px rgba(37,99,235,0.08);
    }
    #chat-input {
      flex: 1;
      background: none;
      border: none;
      outline: none;
      color: var(--text-primary);
      font-family: 'Plus Jakarta Sans', sans-serif;
      font-size: 13px;
      line-height: 1.5;
      resize: none;
      max-height: 120px;
      min-height: 20px;
    }
    #chat-input::placeholder { color: var(--text-muted); }
    .send-btn {
      width: 30px; height: 30px;
      border-radius: var(--r-sm);
      background: var(--accent);
      border: none;
      cursor: pointer;
      display: flex; align-items: center; justify-content: center;
      flex-shrink: 0;
      transition: background 0.15s, transform 0.1s;
    }
    .send-btn:hover  { background: var(--accent-hover); }
    .send-btn:active { transform: scale(0.93); }
    .send-btn:disabled { opacity: 0.35; cursor: not-allowed; transform: none; }
    .send-btn svg { width: 13px; height: 13px; }
    .send-btn svg path { stroke: #ffffff; }

    /* ===== DASHBOARD MODAL ===== */
    .overlay {
      position: fixed;
      inset: 0;
      background: rgba(0,0,0,0.25);
      backdrop-filter: blur(3px);
      z-index: 2000;
      display: none;
      align-items: flex-end;
      justify-content: flex-start;
      padding-top: var(--topnav-h);
    }
    .overlay.open { display: flex; }

    .modal {
      width: 62%;
      height: calc(100vh - var(--topnav-h));
      background: #f8f9fa;
      backdrop-filter: blur(24px);
      border-top: 1px solid var(--border);
      border-right: 1px solid var(--border);
      display: flex;
      flex-direction: column;
      animation: slide-up 0.26s cubic-bezier(0.32, 0.72, 0, 1);
    }
    @keyframes slide-up {
      from { transform: translateY(20px); opacity: 0; }
      to   { transform: translateY(0);    opacity: 1; }
    }

    .modal-header {
      display: flex;
      align-items: center;
      justify-content: space-between;
      padding: 15px 20px;
      border-bottom: 1px solid var(--border);
      flex-shrink: 0;
    }
    .modal-title-row {
      display: flex;
      align-items: center;
      gap: 10px;
    }
    .modal-title { font-size: 14px; font-weight: 600; }
    .modal-asset-tag {
      padding: 3px 10px;
      border-radius: 100px;
      font-size: 11px;
      font-family: 'DM Mono', monospace;
      font-weight: 500;
      background: var(--accent-dim);
      color: var(--accent);
      border: 1px solid rgba(37,99,235,0.15);
    }
    .modal-close-btn {
      width: 28px; height: 28px;
      border-radius: 50%;
      background: var(--surface);
      border: 1px solid var(--border);
      color: var(--text-secondary);
      cursor: pointer;
      font-size: 17px;
      line-height: 1;
      display: flex; align-items: center; justify-content: center;
      transition: background 0.15s, color 0.15s;
    }
    .modal-close-btn:hover { background: var(--surface-hover); color: var(--text-primary); }

    .modal-body {
      flex: 1;
      overflow-y: auto;
      padding: 18px 20px;
      display: flex;
      flex-direction: column;
      gap: 16px;
    }
    .modal-body::-webkit-scrollbar { width: 3px; }
    .modal-body::-webkit-scrollbar-thumb { background: var(--border-strong); border-radius: 4px; }

    /* ===== STAT CARDS ROW ===== */
    .stat-row {
      display: grid;
      grid-template-columns: 1fr 1fr 1fr 1fr;
      gap: 12px;
    }
    .stat-card {
      background: var(--glass);
      border: 1px solid var(--border);
      border-radius: var(--r-xl);
      padding: 16px 18px;
      transition: border-color 0.2s, transform 0.15s;
      position: relative;
      overflow: hidden;
    }
    .stat-card:hover { border-color: var(--border-strong); transform: translateY(-1px); }
    .stat-card::after {
      content: '';
      position: absolute;
      top: 0; left: 0; right: 0;
      height: 2px;
      border-radius: 2px 2px 0 0;
    }
    .stat-card.green::after  { background: #2563eb; }
    .stat-card.amber::after  { background: #f59e0b; }
    .stat-card.blue::after   { background: #0ea5e9; }
    .stat-card.neutral::after { background: #9ca3af; }
    .stat-label {
      font-size: 10px;
      font-weight: 600;
      text-transform: uppercase;
      letter-spacing: 0.07em;
      color: var(--text-muted);
      margin-bottom: 8px;
    }
    .stat-value {
      font-size: 26px;
      font-weight: 700;
      letter-spacing: -0.02em;
      line-height: 1;
      margin-bottom: 4px;
    }
    .stat-value.green  { color: #2563eb; }
    .stat-value.amber  { color: #f59e0b; }
    .stat-value.blue   { color: #0ea5e9; }
    .stat-value.neutral { color: #1a1a1a; }
    .stat-sub {
      font-size: 11px;
      color: var(--text-muted);
      font-family: 'DM Mono', monospace;
    }

    /* ===== CHART CARDS ===== */
    .chart-grid {
      display: grid;
      grid-template-columns: 1fr 1fr;
      gap: 12px;
    }
    .chart-card {
      background: var(--glass);
      border: 1px solid var(--border);
      border-radius: var(--r-xl);
      padding: 16px 18px;
      transition: border-color 0.2s;
    }
    .chart-card:hover { border-color: var(--border-strong); }
    .chart-card-top {
      display: flex;
      align-items: center;
      justify-content: space-between;
      margin-bottom: 12px;
    }
    .chart-card-label {
      font-size: 11px;
      font-weight: 600;
      color: var(--text-secondary);
    }
    .chart-card-unit {
      font-size: 10px;
      font-family: 'DM Mono', monospace;
      color: var(--text-muted);
      background: rgba(255,255,255,0.05);
      padding: 2px 8px;
      border-radius: 100px;
    }
    .chart-wrap { height: 130px; }

    /* Full-width trend */
    .chart-card-wide {
      background: var(--glass);
      border: 1px solid var(--border);
      border-radius: var(--r-xl);
      padding: 16px 18px;
    }
    .chart-wrap-wide { height: 160px; }

    /* Status row */
    .status-row {
      display: grid;
      grid-template-columns: 200px 1fr;
      gap: 12px;
    }
    .donut-card {
      background: var(--glass);
      border: 1px solid var(--border);
      border-radius: var(--r-xl);
      padding: 16px;
      display: flex;
      flex-direction: column;
      align-items: center;
    }
    .donut-wrap { width: 120px; height: 120px; margin: 8px 0; }

    /* Summary table */
    .summary-card {
      background: var(--glass);
      border: 1px solid var(--border);
      border-radius: var(--r-xl);
      overflow: hidden;
    }
    .summary-title {
      padding: 13px 18px;
      font-size: 11px;
      font-weight: 600;
      color: var(--text-secondary);
      border-bottom: 1px solid var(--border);
      display: flex;
      align-items: center;
      gap: 8px;
    }
    .summary-title-dot {
      width: 6px; height: 6px;
      border-radius: 50%;
      background: var(--accent);
    }
    .summary-table { width: 100%; border-collapse: collapse; }
    .summary-table th {
      padding: 9px 18px;
      text-align: left;
      font-size: 10px;
      font-weight: 600;
      text-transform: uppercase;
      letter-spacing: 0.05em;
      color: var(--text-muted);
      background: rgba(255,255,255,0.02);
      border-bottom: 1px solid var(--border);
    }
    .summary-table td {
      padding: 11px 18px;
      font-size: 13px;
      color: var(--text-primary);
      border-bottom: 1px solid rgba(255,255,255,0.03);
    }
    .summary-table tr:last-child td { border-bottom: none; }
    .summary-table tr:hover td { background: rgba(0,0,0,0.02); }
    .summary-table td:first-child {
      font-family: 'DM Mono', monospace;
      font-size: 11px;
      font-weight: 500;
    }
    .metric-dot {
      display: inline-block;
      width: 8px; height: 8px;
      border-radius: 50%;
      margin-right: 8px;
      vertical-align: middle;
    }
    .summary-num { font-weight: 700; font-family: 'DM Mono', monospace; font-size: 13px; }
    .summary-unit-tag { font-size: 10px; color: var(--text-muted); margin-left: 3px; }
    .summary-bar {
      display: inline-block;
      height: 4px;
      border-radius: 2px;
      vertical-align: middle;
      margin-left: 8px;
      opacity: 0.5;
    }

    /* Shimmer skeleton */
    @keyframes shimmer {
      0%   { background-position: -200% center; }
      100% { background-position:  200% center; }
    }
    .skeleton {
      background: linear-gradient(90deg, #e5e7eb 25%, #f3f4f6 50%, #e5e7eb 75%);
      background-size: 200% auto;
      animation: shimmer 1.5s linear infinite;
      border-radius: var(--r-md);
      height: 11px;
      margin-bottom: 8px;
    }
  </style>
</head>
<body>

<!-- TOPNAV -->
<nav class="topnav">
  <div class="topnav-brand">
    <div class="live-dot"></div>
    Asset Monitoring Agent
  </div>
  <div class="topnav-right">
    <span class="pill pill-live">LIVE</span>
    <span class="pill-meta">4 assets · simulation</span>
  </div>
</nav>

<!-- MAIN -->
<div class="main">

  <!-- MAP -->
  <div class="map-panel">
    <div id="map"></div>
  </div>

  <!-- CHAT -->
  <div class="chat-panel">
    <div class="chat-header">
      <span class="chat-header-title">Agent</span>
      <span class="context-badge" id="ctx-badge">—</span>
    </div>

    <div class="chat-thread" id="chat-thread">
      <div class="chat-empty" id="chat-empty">
        <div class="chat-empty-glyph">◈</div>
        <div class="chat-empty-title">Asset Agent</div>
        <div class="chat-empty-sub">Select an asset on the map, then ask anything about its data.</div>
        <div class="prompt-suggestions" id="prompt-suggestions">
          <button class="prompt-chip" data-prompt="What was the corrosion rate on 2026-02-15?">Corrosion rate on a date?</button>
          <button class="prompt-chip" data-prompt="Show me a summary of all metrics for this asset.">Summarize all metrics</button>
          <button class="prompt-chip" data-prompt="What are the min and max pressure readings?">Pressure min and max?</button>
          <button class="prompt-chip" data-prompt="What is the busy vs idle status breakdown for this asset?">Busy vs idle breakdown?</button>
          <button class="prompt-chip" data-prompt="How has the temperature changed over the 90-day period?">Temperature trend over 90 days?</button>
          <button class="prompt-chip" data-prompt="Which asset has the highest average corrosion rate?">Highest corrosion across assets?</button>
        </div>
      </div>
    </div>

    <div class="chat-input-wrap">
      <div class="chat-input-row">
        <textarea id="chat-input" placeholder="Ask about this asset..." rows="1"></textarea>
        <button class="send-btn" id="send-btn" title="Send">
          <svg viewBox="0 0 14 14" fill="none" xmlns="http://www.w3.org/2000/svg">
            <path d="M7 12V2M7 2L2.5 6.5M7 2L11.5 6.5" stroke="#0a0a0a" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"/>
          </svg>
        </button>
      </div>
    </div>
  </div>

</div>

<!-- DASHBOARD MODAL -->
<div class="overlay" id="overlay">
  <div class="modal" id="modal">
    <div class="modal-header">
      <div class="modal-title-row">
        <span class="modal-title">Dashboard</span>
        <span class="modal-asset-tag" id="modal-tag">—</span>
      </div>
      <button class="modal-close-btn" id="modal-close">×</button>
    </div>
    <div class="modal-body" id="modal-body"></div>
  </div>
</div>

<script>
const API = 'http://localhost:8002';
let selectedAsset = null;
let chatHistory   = [];
let streaming     = false;
const chartInstances = {};

/* ── ASSET MAP POSITIONS (anonymous simulation) ─────────────── */
const COORDS = {
  Asset_A: [26.2961, 50.2080],
  Asset_B: [26.4390, 50.1010],
  Asset_C: [26.1920, 50.1850],
  Asset_D: [26.3540, 50.1540],
};
const CHART_CFG = {
  corrosion_rate: { color: '#2563eb', bg: 'rgba(37,99,235,0.08)', label: 'Corrosion Rate', unit: 'mm/yr' },
  temperature:   { color: '#f59e0b', bg: 'rgba(245,158,11,0.08)', label: 'Temperature',   unit: '°C'    },
  pressure:      { color: '#0ea5e9', bg: 'rgba(14,165,233,0.08)',  label: 'Pressure',       unit: 'bar'   },
};

/* ── MAP ─────────────────────────────────────────────────────── */
const map = L.map('map', { zoomControl: true, attributionControl: false })
             .setView([26.3200, 50.1500], 11);

L.tileLayer('https://{s}.basemaps.cartocdn.com/dark_all/{z}/{x}/{y}{r}.png', { maxZoom: 19 })
 .addTo(map);

const leafletMarkers = {};

function pinIcon(name, sel) {
  const letter = name.split('_')[1];
  return L.divIcon({
    className: '',
    html: `<div class="asset-pin${sel ? ' selected' : ''}"><div class="asset-pin-label">${letter}</div></div>`,
    iconSize: [38, 38],
    iconAnchor: [19, 38],
    popupAnchor: [0, -40],
  });
}

function buildPopup(name) {
  const d = document.createElement('div');
  d.className = 'popup-card';
  d.innerHTML = `
    <div class="popup-name">${name}</div>
    <div class="popup-row"><span>Status</span><span class="popup-status busy">● Active</span></div>
    <div class="popup-row"><span>Location</span><span style="color:var(--text-muted);font-size:11px;font-family:'DM Mono',monospace">simulation</span></div>
    <div class="popup-actions">
      <button class="popup-btn popup-btn-primary" onclick="openDashboard('${name}')">Dashboard →</button>
      <button class="popup-btn popup-btn-ghost"   onclick="selectAndAsk('${name}')">Ask Agent</button>
    </div>`;
  return d;
}

async function loadAssets() {
  try {
    const res = await fetch(`${API}/api/assets`);
    const assets = await res.json();
    assets.forEach(name => {
      const coords = COORDS[name] || [26.3200, 50.1500];
      const m = L.marker(coords, { icon: pinIcon(name, false) }).addTo(map);
      m.bindPopup(L.popup({ closeButton: true, maxWidth: 240 }).setContent(buildPopup(name)));
      m.on('click', () => { selectAsset(name); m.openPopup(); });
      leafletMarkers[name] = m;
    });
  } catch { /* server not yet running */ }
}

function selectAsset(name) {
  selectedAsset = name;
  Object.entries(leafletMarkers).forEach(([n, m]) => m.setIcon(pinIcon(n, n === name)));
  const badge = document.getElementById('ctx-badge');
  badge.textContent = name;
  badge.classList.add('show');
}

function selectAndAsk(name) {
  selectAsset(name);
  document.getElementById('chat-input').focus();
}

/* ── DASHBOARD MODAL ─────────────────────────────────────────── */
async function openDashboard(asset) {
  selectAsset(asset);
  document.getElementById('modal-tag').textContent = asset;
  document.getElementById('overlay').classList.add('open');

  const body = document.getElementById('modal-body');
  body.innerHTML = '';

  Object.values(chartInstances).forEach(c => c.destroy());
  Object.keys(chartInstances).forEach(k => delete chartInstances[k]);

  const types = Object.keys(CHART_CFG);
  const METRIC_COLORS = { corrosion_rate: '#2563eb', temperature: '#f59e0b', pressure: '#0ea5e9' };

  /* ── Stat cards skeleton ── */
  const statRow = document.createElement('div');
  statRow.className = 'stat-row';
  statRow.id = 'stat-row';
  statRow.innerHTML = `
    <div class="stat-card green"><div class="stat-label">Avg Corrosion</div><div class="skeleton" style="width:60%;height:26px;margin-bottom:6px"></div><div class="skeleton" style="width:40%;height:11px"></div></div>
    <div class="stat-card amber"><div class="stat-label">Avg Temperature</div><div class="skeleton" style="width:60%;height:26px;margin-bottom:6px"></div><div class="skeleton" style="width:40%;height:11px"></div></div>
    <div class="stat-card blue"><div class="stat-label">Avg Pressure</div><div class="skeleton" style="width:60%;height:26px;margin-bottom:6px"></div><div class="skeleton" style="width:40%;height:11px"></div></div>
    <div class="stat-card neutral"><div class="stat-label">Data Points</div><div class="skeleton" style="width:60%;height:26px;margin-bottom:6px"></div><div class="skeleton" style="width:40%;height:11px"></div></div>`;
  body.appendChild(statRow);

  /* ── 2-column chart grid (corrosion + temperature) ── */
  const grid = document.createElement('div');
  grid.className = 'chart-grid';
  ['corrosion_rate', 'temperature'].forEach(t => {
    const cfg = CHART_CFG[t];
    const card = document.createElement('div');
    card.className = 'chart-card';
    card.innerHTML = `
      <div class="chart-card-top">
        <span class="chart-card-label">${cfg.label}</span>
        <span class="chart-card-unit">${cfg.unit}</span>
      </div>
      <div class="chart-wrap"><canvas id="mini-${t}"></canvas></div>`;
    grid.appendChild(card);
  });
  body.appendChild(grid);

  /* ── Pressure + status donut row ── */
  const statusRow = document.createElement('div');
  statusRow.className = 'status-row';
  statusRow.innerHTML = `
    <div class="donut-card">
      <div class="chart-card-label" style="margin-bottom:4px">Utilization</div>
      <div class="donut-wrap"><canvas id="donut-status"></canvas></div>
    </div>
    <div class="chart-card">
      <div class="chart-card-top">
        <span class="chart-card-label">${CHART_CFG.pressure.label}</span>
        <span class="chart-card-unit">${CHART_CFG.pressure.unit}</span>
      </div>
      <div class="chart-wrap"><canvas id="mini-pressure"></canvas></div>
    </div>`;
  body.appendChild(statusRow);

  /* ── Full-width trend ── */
  const wide = document.createElement('div');
  wide.className = 'chart-card-wide';
  wide.innerHTML = `
    <div class="chart-card-top">
      <span class="chart-card-label">90-Day Trend · All Metrics</span>
    </div>
    <div class="chart-wrap-wide"><canvas id="trend-all"></canvas></div>`;
  body.appendChild(wide);

  /* ── Summary skeleton ── */
  const summaryEl = document.createElement('div');
  summaryEl.className = 'summary-card';
  summaryEl.id = 'summary-el';
  summaryEl.innerHTML = `
    <div class="summary-title"><span class="summary-title-dot"></span> Summary Statistics</div>
    <div style="padding:14px 18px">
      <div class="skeleton" style="width:100%"></div>
      <div class="skeleton" style="width:80%"></div>
      <div class="skeleton" style="width:90%"></div>
    </div>`;
  body.appendChild(summaryEl);

  /* ── Chart.js shared config ── */
  const tooltipCfg = {
    backgroundColor: '#ffffff',
    borderColor: 'rgba(0,0,0,0.1)',
    borderWidth: 1,
    titleColor: '#1a1a1a',
    bodyColor: '#6b7280',
    padding: 10,
    cornerRadius: 8,
    titleFont: { family: 'DM Mono', size: 11 },
    bodyFont: { family: 'DM Mono', size: 11 },
    displayColors: false,
    boxShadow: '0 2px 8px rgba(0,0,0,0.1)',
  };
  const baseOpts = () => ({
    responsive: true,
    maintainAspectRatio: false,
    animation: { duration: 500 },
    interaction: { mode: 'index', intersect: false },
    plugins: { legend: { display: false }, tooltip: tooltipCfg },
    scales: {
      x: { grid: { color: 'rgba(0,0,0,0.06)', drawBorder: false }, ticks: { color: '#9ca3af', font: { family: 'DM Mono', size: 9 }, maxTicksLimit: 6 } },
      y: { grid: { color: 'rgba(0,0,0,0.06)', drawBorder: false }, ticks: { color: '#9ca3af', font: { family: 'DM Mono', size: 9 }, maxTicksLimit: 5 } },
    },
  });

  /* ── Fetch data & render ── */
  const datasets = {};
  let busyCount = 0, idleCount = 0;

  for (const t of types) {
    try {
      const res  = await fetch(`${API}/api/measurements/${asset}/${t}`);
      const data = await res.json();
      datasets[t] = data;

      if (t === types[0]) {
        data.forEach(d => { if (d.status === 'busy') busyCount++; else idleCount++; });
      }

      const canvas = document.getElementById(`mini-${t}`);
      const cfg    = CHART_CFG[t];

      chartInstances[`mini-${t}`] = new Chart(canvas, {
        type: 'line',
        data: {
          labels: data.map(d => d.date.slice(5)),
          datasets: [{
            data: data.map(d => d.value),
            borderColor: cfg.color,
            backgroundColor: cfg.bg,
            borderWidth: 2,
            pointRadius: 1,
            pointHoverRadius: 4,
            pointHoverBackgroundColor: cfg.color,
            pointHoverBorderColor: '#ffffff',
            pointHoverBorderWidth: 2,
            fill: true,
            tension: 0.3,
          }],
        },
        options: baseOpts(),
      });
    } catch { /* skip */ }
  }

  /* ── Populate stat cards ── */
  try {
    const res  = await fetch(`${API}/api/summary/${asset}`);
    const rows = await res.json();
    const statData = {};
    rows.forEach(r => { statData[r.type] = r; });

    const cr = statData['corrosion_rate'];
    const tp = statData['temperature'];
    const pr = statData['pressure'];
    const total = Object.values(datasets).reduce((s, d) => s + d.length, 0);

    document.getElementById('stat-row').innerHTML = `
      <div class="stat-card green">
        <div class="stat-label">Avg Corrosion</div>
        <div class="stat-value green">${cr ? cr.avg : '—'}</div>
        <div class="stat-sub">${cr ? cr.unit + ' · range ' + cr.min + '–' + cr.max : ''}</div>
      </div>
      <div class="stat-card amber">
        <div class="stat-label">Avg Temperature</div>
        <div class="stat-value amber">${tp ? tp.avg : '—'}</div>
        <div class="stat-sub">${tp ? tp.unit + ' · range ' + tp.min + '–' + tp.max : ''}</div>
      </div>
      <div class="stat-card blue">
        <div class="stat-label">Avg Pressure</div>
        <div class="stat-value blue">${pr ? pr.avg : '—'}</div>
        <div class="stat-sub">${pr ? pr.unit + ' · range ' + pr.min + '–' + pr.max : ''}</div>
      </div>
      <div class="stat-card neutral">
        <div class="stat-label">Data Points</div>
        <div class="stat-value neutral">${total}</div>
        <div class="stat-sub">90 days · 3 metrics</div>
      </div>`;

    /* ── Summary table ── */
    const el = document.getElementById('summary-el');
    el.innerHTML = `
      <div class="summary-title"><span class="summary-title-dot"></span> Summary Statistics</div>
      <table class="summary-table">
        <thead><tr>
          <th>Metric</th><th>Average</th><th>Min</th><th>Max</th><th>Unit</th>
        </tr></thead>
        <tbody>
          ${rows.map(r => {
            const color = METRIC_COLORS[r.type] || '#a8a29e';
            const range = r.max - r.min;
            const pct = range > 0 ? Math.round(((r.avg - r.min) / range) * 100) : 50;
            return `<tr>
              <td><span class="metric-dot" style="background:${color}"></span>${r.type.replace('_', ' ')}</td>
              <td><span class="summary-num" style="color:${color}">${r.avg}</span><span class="summary-bar" style="width:${pct}px;background:${color}"></span></td>
              <td>${r.min}</td>
              <td>${r.max}</td>
              <td><span class="summary-unit-tag">${r.unit}</span></td>
            </tr>`;
          }).join('')}
        </tbody>
      </table>`;
  } catch { /* skip */ }

  /* ── Donut chart ── */
  try {
    const donutCtx = document.getElementById('donut-status');
    chartInstances['donut-status'] = new Chart(donutCtx, {
      type: 'doughnut',
      data: {
        labels: ['Busy', 'Idle'],
        datasets: [{
          data: [busyCount, idleCount],
          backgroundColor: ['#2563eb', '#e5e7eb'],
          borderColor: '#ffffff',
          borderWidth: 3,
          borderRadius: 4,
        }],
      },
      options: {
        responsive: true,
        maintainAspectRatio: false,
        cutout: '70%',
        animation: { duration: 800, easing: 'easeOutQuart' },
        plugins: {
          legend: { display: true, position: 'bottom', labels: { color: '#6b7280', font: { family: 'DM Mono', size: 10 }, boxWidth: 10, padding: 8 } },
          tooltip: tooltipCfg,
        },
      },
    });
  } catch { /* skip */ }

  /* ── Multi-line trend ── */
  if (Object.keys(datasets).length) {
    const firstType = types[0];
    const labels = datasets[firstType]?.map(d => d.date.slice(5)) || [];
    const trendCtx = document.getElementById('trend-all');
    chartInstances['trend-all'] = new Chart(trendCtx, {
      type: 'line',
      data: {
        labels,
        datasets: types.map(t => ({
          label: CHART_CFG[t].label,
          data: (datasets[t] || []).map(d => d.value),
          borderColor: CHART_CFG[t].color,
          backgroundColor: 'transparent',
          borderWidth: 2,
          pointRadius: 1,
          pointHoverRadius: 4,
          tension: 0.3,
          yAxisID: t === 'corrosion_rate' ? 'y' : 'y2',
        })),
      },
      options: {
        responsive: true,
        maintainAspectRatio: false,
        animation: { duration: 500 },
        interaction: { mode: 'index', intersect: false },
        plugins: {
          legend: { display: true, position: 'top', align: 'end', labels: { color: '#6b7280', font: { family: 'DM Mono', size: 10 }, boxWidth: 10, usePointStyle: true, pointStyle: 'circle', padding: 14 } },
          tooltip: tooltipCfg,
        },
        scales: {
          x:  { grid: { color: 'rgba(0,0,0,0.06)', drawBorder: false }, ticks: { color: '#9ca3af', font: { family: 'DM Mono', size: 9 }, maxTicksLimit: 8 } },
          y:  { position: 'left',  grid: { color: 'rgba(0,0,0,0.06)', drawBorder: false }, ticks: { color: '#2563eb', font: { family: 'DM Mono', size: 9 } } },
          y2: { position: 'right', grid: { display: false }, ticks: { color: '#9ca3af', font: { family: 'DM Mono', size: 9 } } },
        },
      },
    });
  }
}

document.getElementById('modal-close').addEventListener('click', () => {
  document.getElementById('overlay').classList.remove('open');
});
document.getElementById('overlay').addEventListener('click', e => {
  if (e.target === document.getElementById('overlay'))
    document.getElementById('overlay').classList.remove('open');
});

/* ── CHAT ────────────────────────────────────────────────────── */
function clearEmpty() {
  const el = document.getElementById('chat-empty');
  if (el) el.remove();
}

function appendMsg(role, html) {
  clearEmpty();
  const thread = document.getElementById('chat-thread');
  const msg    = document.createElement('div');
  msg.className = `msg ${role}`;
  const bubble  = document.createElement('div');
  bubble.className = 'bubble';
  bubble.innerHTML  = html;
  msg.appendChild(bubble);
  thread.appendChild(msg);
  thread.scrollTop = thread.scrollHeight;
  return bubble;
}

function showLoader() {
  clearEmpty();
  const thread = document.getElementById('chat-thread');
  const wrap   = document.createElement('div');
  wrap.className = 'msg ai';
  wrap.id = 'ai-loader-msg';
  wrap.innerHTML = `<div class="ai-loader">
    <div class="ai-loader-dot"></div>
    <div class="ai-loader-dot"></div>
    <div class="ai-loader-dot"></div>
  </div>`;
  thread.appendChild(wrap);
  thread.scrollTop = thread.scrollHeight;
}

function removeLoader() {
  document.getElementById('ai-loader-msg')?.remove();
}

async function sendMessage() {
  const input = document.getElementById('chat-input');
  const text  = input.value.trim();
  if (!text || streaming) return;

  input.value = '';
  input.style.height = 'auto';
  streaming = true;
  document.getElementById('send-btn').disabled = true;

  appendMsg('user', text);
  showLoader();

  try {
    const res = await fetch(`${API}/api/chat`, {
      method:  'POST',
      headers: { 'Content-Type': 'application/json' },
      body: JSON.stringify({
        message:       text,
        history:       chatHistory,
        asset_context: selectedAsset,
      }),
    });

    removeLoader();
    const bubble = appendMsg('ai', '');

    const reader  = res.body.getReader();
    const decoder = new TextDecoder();
    let full = '';

    while (true) {
      const { done, value } = await reader.read();
      if (done) break;
      full += decoder.decode(value);
      bubble.innerHTML = marked.parse(full);
      document.getElementById('chat-thread').scrollTop = 9999;
    }

    chatHistory.push({ role: 'user',      content: selectedAsset ? `[Viewing: ${selectedAsset}]\n${text}` : text });
    chatHistory.push({ role: 'assistant', content: full });

  } catch {
    removeLoader();
    appendMsg('ai', 'Connection error — make sure the server is running on port 8002.');
  }

  streaming = false;
  document.getElementById('send-btn').disabled = false;
}

document.getElementById('send-btn').addEventListener('click', sendMessage);
document.getElementById('chat-input').addEventListener('keydown', e => {
  if (e.key === 'Enter' && !e.shiftKey) { e.preventDefault(); sendMessage(); }
});
document.getElementById('chat-input').addEventListener('input', function() {
  this.style.height = 'auto';
  this.style.height = Math.min(this.scrollHeight, 120) + 'px';
});

/* ── PROMPT SUGGESTIONS ─────────────────────────────────────── */
document.getElementById('prompt-suggestions').addEventListener('click', e => {
  const chip = e.target.closest('.prompt-chip');
  if (!chip) return;
  const input = document.getElementById('chat-input');
  input.value = chip.dataset.prompt;
  input.focus();
  input.style.height = 'auto';
  input.style.height = Math.min(input.scrollHeight, 120) + 'px';
});

/* ── INIT ────────────────────────────────────────────────────── */
loadAssets();
</script>
</body>
</html>
